asyncapi: 3.0.0
info:
  title: Zilla Petstore - AsyncAPI 3.0
  description: Zilla implements the Petstore Kafka spec
  version: 1.0.0
  license:
    name: Aklivity Community License
  contact:
    name: Aklivity Community
    url: https://www.aklivity.io/slack
  externalDocs:
    description: Find out more about Zilla
    url: https://docs.aklivity.io/
defaultContentType: application/json
servers:
  local-connections:
    host: "kafka:9092"
    protocol: kafka
    description: Local broker
channels:
  petstore:
    address: "petstore"
    messages:
      pet:
        $ref: "#/components/messages/pet"
    description: The topic on which pet values may be produced and consumed.
operations:
  listPets:
    action: receive
    channel:
      $ref: "#/channels/petstore"
    summary: List all pets.
    messages:
      - $ref: "#/channels/petstore/messages/pet"
  createPets:
    action: send
    channel:
      $ref: "#/channels/petstore"
    summary: Create a pet.
    messages:
      - $ref: "#/channels/petstore/messages/pet"
components:
  messages:
    pet:
      name: Pet
      title: Pet
      summary: Info about a Pet.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/Pet"
  schemas:
    Tag:
      type: object
      properties:
        name:
          type: string
          example: "gentle"
    Pet:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          example: doggie
        tags:
          type: array
          items:
            "$ref": "#/components/schemas/Tag"
        status:
          type: string
          description: pet status in the store
          enum:
            - available
            - pending
            - sold
